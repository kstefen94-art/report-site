<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>리포트 포털</title>
  <style>
    body{
      font-family: Arial, "Malgun Gothic", sans-serif;
      margin: 40px;
      background: #f7f8fa;
      color: #111;
    }
    .box{
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 30px;
    }
    h1{
      margin-top: 0;
    }
    a{
      display: inline-block;
      margin-top: 10px;
      margin-right: 12px;
      padding: 12px 16px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>리포트 포털</h1>
    <p>원하는 리포트를 선택하세요.</p>

    <a href="./sales/">실적 리포트</a>
    <a href="./activity/">활동 리포트</a>
  </div>
</body>
</html>
